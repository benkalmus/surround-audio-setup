monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "alsa_output.usb-0d8c_USB_Sound_Device-00.pro-output-0"
      }
    ]
    actions = {
      update-props = {
        audio.channels = 8
        audio.position = [ FL, FR, FC, LFE, RL, RR, SL, SR ]
        channelmix.upmix = true
        channelmix.upmix-method = psd
        channelmix.lfe-cutoff = 150
        channelmix.fc-cutoff = 0
        channelmix.rear-delay = 12.0
        channelmix.center-level = 0
        channelmix.surround-level = 0
      }
    }
  }
]
