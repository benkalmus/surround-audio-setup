context.modules = [
    {
        name = libpipewire-module-loopback
        args = {
            node.description = "Unified Surround Upmix"
            audio.position = [ FL FR FC LFE RL RR ]
            capture.props = {
                node.name = "unified-upmix"
                media.class = Audio/Sink
                node.priority.driver = 1000
                node.priority.session = 1000
                channelmix.upmix = true
                channelmix.upmix-method = psd
                channelmix.lfe-cutoff = 150
                channelmix.rear-delay = 12.0
            }
            playback.props = {
                node.name = "unified-upmix-output"
                audio.position = [ FL FR RL RR LFE ]
                target.object = "alsa_output.usb-0d8c_USB_Sound_Device-00.analog-surround-51"
                node.passive = true
                stream.dont-remix = true
            }
        }
    }
]
